<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home page</title>
  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&display=swap"
    rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Styles -->
  <style>
    * {
      font-family: "Outfit", sans-serif;
    }
  </style>
</head>

<body class="bg-base-300">

  <header>
    <div class=" flex flex-col gap-5 md:flex-row navbar bg-white shadow-sm">
      <div class="flex-1">
        <a class="btn btn-ghost text-xl">
          <img class="w-[50px]" src="assets/github-logo.png" alt="">
          <span>GitHub Issues Tracker</span>
          <p></p>
        </a>
      </div>

      <div class="flex gap-2">
        <input id="search-btn" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />

        <div class="">
          <button onclick="search()" class="btn btn-primary"> <i class="fa-solid fa-plus"></i>
            New Issue</button>
        </div>

      </div>

    </div>
  </header>

  <section>
    <div class="w-[80%] mx-auto mt-8 mb-5 p-5 flex gap-3 bg-white">

      <button id="all-btn" onclick="switchTab(all)" class="btn btn-primary">All</button>

      <button id="open-btn" onclick="switchTab(open)" class="btn ">Open</button>

      <button id="closed-btn" onclick="switchTab(close)" class="btn">Closed</button>

    </div>
  </section>


  <section>
    <div class=" w-[80%] mx-auto flex flex-col md:flex-row gap-3 justify-between bg-white p-5">
      <div class="flex gap-4">
        <img src="assets/Aperture.png" alt="">

        <div>
          <h4 class="text-2xl font-bold"><span id="issue-count"> 50 Issues</span></h4>
          <p class="text-gray-400">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex gap-2">
        <p class="text-xl font-semibold">Open</p>
        <p class="text-xl font-semibold">Closed</p>
      </div>
    </div>

  </section>

  <section id="spinner" class="flex justify-center items-center py-8 hidden">
    <span class="loading loading-spinner text-success"></span>
  </section>


  <section class="w-[80%] mx-auto mt-6">
    <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 shadow-2xl">
    </div>
  </section>

  <!-- Open the modal using ID.showModal() method -->
  <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

  <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
      <div id="details-container"></div>

      <div class="modal-action">
        <form method="dialog">
          <!-- if there is a button in form, it will close the modal -->
          <button class="btn btn-primary">Close</button>
        </form>
      </div>
    </div>
  </dialog>


  <script src="script/home.js"></script>
</body>

</html>
