<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <!-- Tailwind + DaisyUI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 <!-- Google font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link
  href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&display=swap"
  rel="stylesheet">
 <!-- Font Awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />
 <!-- Styles -->
 <style>
  * {
   font-family: "Outfit", sans-serif;
  }
 </style>
</head>

<body class="min-h-screen bg-base-300 max-w-md mx-auto">

 <div class="form pt-6">

  <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">

   <div class="logo mx-auto pt-5">
    <img src="assets/github-logo.png" alt="">
   </div>
   <p class="mx-auto text-sm pt-5">Sign in to manage your issues</p>


   <div class="card-body">
    <fieldset class="fieldset">
     <label class="label text-neutral font-bold">Username</label>
     <input id="input-text" type="text" class="input rounded-full bg-base-200"
      value="" placeholder="Enter Username" />

     <br>

     <label class="label text-neutral font-bold">Password</label>
     <input id="input-pin" type="password" maxlength="8" class="input rounded-full bg-base-200"
      placeholder="Enter password" />
     <div></div>
     <button id="signIn-btn" class="btn btn-primary mt-4 rounded-full">Sign In</button>
    </fieldset>
   </div>

 <h4 class="text-2xl font-bold text-center">OR</h4>
<div class="text-center mt-6">
 <p class="text-gray-500 mb-3">Demo Credentials:</p>

 <div class="rounded-lg p-6 w-80 mx-auto">
  <p class="font-semibold">
   Username: <span class="font-normal">admin</span>
  </p>
  <p class="font-semibold">
   Password: <span class="font-normal">admin123</span>
  </p>
 </div>
</div>

  </div>
 </div>

</body>

</html>
